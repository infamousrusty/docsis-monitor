---
name: CodeQL — SAST

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1"
  workflow_dispatch:

# Workflow-level concurrency: one scan workflow per ref.
# Does NOT reference matrix — matrix is not available at this scope.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  changes:
    name: Detect Relevant Changes
    runs-on: ubuntu-24.04
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Path filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            code:
              - 'src/**'
              - '**/*.py'
              - '**/*.js'
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.jsx'
              - 'requirements*.txt'
              - 'pyproject.toml'
              - 'package*.json'

  analyse:
    name: Analyse (${{ matrix.language }})
    runs-on: ubuntu-24.04
    needs: changes

    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.code == 'true'

    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]

    # Job-level concurrency: one scan per ref + language combination.
    # matrix context IS available here — jobs.<job_id>.concurrency is
    # evaluated after matrix expansion.
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.language }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v6

      - name: Initialise CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          config-file: .github/codeql-config.yml

      - name: Perform Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"