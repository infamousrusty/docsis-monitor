# ──────────────────────────────────────────────────────────────────────────────
# DOCSIS Monitor — virtual-host config
# Hardened: rate-limiting, Tailscale-aware ACLs, optional basic auth,
# security headers, proxy hardening.
#
# TAILSCALE ACL STRATEGY
# ─────────────────────────────────────────────────────────────────────────────
# By default the stack binds to 127.0.0.1 or a Tailscale interface only.
# Set EXPOSE_INTERFACE=100.x.x.x in your compose .env and map it via:
#   ports:
#     - "${EXPOSE_INTERFACE:-127.0.0.1}:3000:80"
# This means only Tailscale peers can reach the dashboard — no public exposure.
# ──────────────────────────────────────────────────────────────────────────────

# ── Rate-limiting zones ───────────────────────────────────────────────────────
# General UI requests — 30 r/s per IP (human browsing)
limit_req_zone $binary_remote_addr zone=ui:10m    rate=30r/s;
# API polling — 10 r/s per IP (dashboard JS fetch loops)
limit_req_zone $binary_remote_addr zone=api:10m   rate=10r/s;
# Prometheus scrape — 2 r/s (Prometheus default 15s interval)
limit_req_zone $binary_remote_addr zone=metrics:5m rate=2r/s;
# Grafana — 20 r/s per IP
limit_req_zone $binary_remote_addr zone=grafana:10m rate=20r/s;

# ── Tailscale / LAN trusted ranges ───────────────────────────────────────────
# These IPs skip rate-limit burst penalties (still subject to zone limits).
# Extend with your LAN CIDR if needed.
geo $trusted_network {
    default          0;
    100.64.0.0/10    1;   # Tailscale CGNAT range
    127.0.0.0/8      1;   # loopback
    10.0.0.0/8       1;   # RFC1918 LAN
    172.16.0.0/12    1;   # RFC1918 LAN
    192.168.0.0/16   1;   # RFC1918 LAN
}

# Map trusted networks to a higher burst allowance
map $trusted_network $rate_burst {
    1  20;
    0  5;
}

# ── Optional basic-auth helper ────────────────────────────────────────────────
# Drop a bcrypt htpasswd file at /etc/nginx/auth/.htpasswd inside the container.
# Set BASIC_AUTH_ENABLED=true in .env to activate.
# Generate: htpasswd -cB /etc/nginx/auth/.htpasswd <user>
# The auth_basic directives are gated on the file's existence.
map $http_authorization $auth_realm {
    default  "DOCSIS Monitor";
    ~.       "";
}

server {
    listen 80 default_server;
    server_name _;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"             always;
    add_header X-Content-Type-Options     "nosniff"                always;
    add_header X-XSS-Protection           "1; mode=block"          always;
    add_header Referrer-Policy            "strict-origin"          always;
    add_header Permissions-Policy         "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; "
        "script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://api.fontshare.com; "
        "style-src  'self' 'unsafe-inline' https://api.fontshare.com; "
        "font-src   'self' https://api.fontshare.com; "
        "img-src    'self' data:; "
        "connect-src 'self'; "
        "frame-ancestors 'none';" always;

    # Strip inbound headers that expose backend info
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    # ── Client limits ─────────────────────────────────────────────────────────
    client_max_body_size    1m;
    client_body_timeout     12s;
    client_header_timeout   12s;
    send_timeout            10s;
    keepalive_timeout       30s;

    # ── Root redirect ─────────────────────────────────────────────────────────
    location = / {
        return 301 /overview.html;
    }

    # ── Frontend static ───────────────────────────────────────────────────────
    location ~* \.(html|css|js|svg|ico|woff2?)$ {
        limit_req zone=ui burst=$rate_burst nodelay;
        proxy_pass http://web;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache static assets aggressively at the browser
        add_header Cache-Control "public, max-age=3600, must-revalidate" always;
        expires 1h;
    }

    # ── REST API ──────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=$rate_burst nodelay;

        # Optional basic auth — uncomment when .htpasswd is mounted
        # auth_basic           "DOCSIS Monitor";
        # auth_basic_user_file /etc/nginx/auth/.htpasswd;

        proxy_pass          http://app;
        proxy_http_version  1.1;
        proxy_set_header    Connection        "";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
        proxy_connect_timeout 5s;
        proxy_send_timeout  10s;

        # No caching for API responses
        add_header Cache-Control "no-store, no-cache" always;
    }

    # ── Prometheus /metrics endpoint ──────────────────────────────────────────
    # Restrict to trusted networks only — never expose to internet
    location /metrics {
        limit_req zone=metrics burst=3 nodelay;

        # Block untrusted sources
        if ($trusted_network = 0) {
            return 403 '{"error":"forbidden","detail":"metrics endpoint restricted to trusted networks"}';
        }

        proxy_pass          http://app;
        proxy_http_version  1.1;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        add_header          Cache-Control "no-store" always;
    }

    # ── Health endpoint (unauthenticated, internal only) ──────────────────────
    location /health {
        proxy_pass         http://app;
        proxy_set_header   Host $host;
        access_log         off;
        add_header         Cache-Control "no-store" always;
    }

    # ── Grafana sub-path ──────────────────────────────────────────────────────
    location /grafana/ {
        limit_req zone=grafana burst=$rate_burst nodelay;

        # Optional basic auth for Grafana too — Grafana has its own auth
        # but this adds a second layer when behind Tailscale.
        # auth_basic           "DOCSIS Monitor";
        # auth_basic_user_file /etc/nginx/auth/.htpasswd;

        proxy_pass          http://grafana/;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";
        proxy_read_timeout  60s;
    }

    # ── Block common scanners / path probing ──────────────────────────────────
    location ~* /(wp-admin|wp-login|xmlrpc|\.php|\.asp|\.env|\.git|cgi-bin) {
        return 444;
    }

    # ── Deny hidden files ─────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Custom error pages ────────────────────────────────────────────────────
    error_page 429 /429.json;
    location = /429.json {
        internal;
        default_type application/json;
        return 429 '{"error":"rate_limited","detail":"too many requests — slow down"}';
    }

    error_page 403 /403.json;
    location = /403.json {
        internal;
        default_type application/json;
        return 403 '{"error":"forbidden"}';
    }

    error_page 502 503 504 /50x.json;
    location = /50x.json {
        internal;
        default_type application/json;
        return 503 '{"error":"upstream_unavailable","detail":"backend is starting or unreachable"}';
    }
}
