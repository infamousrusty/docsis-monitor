# auth.conf — included by docsis.conf for locations that respect basic auth.
# This file is generated at container startup by the entrypoint logic in
# docker-compose.yml (see BASIC_AUTH_USER / BASIC_AUTH_PASS env vars).
#
# When BASIC_AUTH_USER is empty this file contains a no-op directive.
# When set, it activates HTTP Basic Authentication.
#
# DO NOT place secrets here — use the .env file and the compose entrypoint.
#
# The compose service can generate the htpasswd file on startup:
#
#   command: >-
#     sh -c "
#       if [ -n "$$BASIC_AUTH_USER" ]; then
#         apk add --no-cache apache2-utils &&
#         htpasswd -bc /etc/nginx/auth/.htpasswd $$BASIC_AUTH_USER $$BASIC_AUTH_PASS &&
#         echo 'auth_basic "DOCSIS Monitor"; auth_basic_user_file /etc/nginx/auth/.htpasswd;' \
#           > /etc/nginx/conf.d/auth.conf;
#       fi &&
#       nginx -g 'daemon off;'
#     "
#
# Until the entrypoint writes a real auth directive, this no-op is safe:
auth_basic off;
