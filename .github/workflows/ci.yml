# ──────────────────────────────────────────────────────────────────────────────
# DOCSIS Monitor — CI Pipeline
# Stages: lint → test → docker-build → trivy-scan
# Runs on: push to main/develop, all PRs
# ──────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff + nginx)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install ruff
        run: pip install ruff==0.4.10

      - name: Ruff lint
        run: ruff check backend/ tests/

      - name: Ruff format check
        run: ruff format --check backend/ tests/

      - name: Validate nginx config
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/nginx:/etc/nginx:ro" \
            nginx:1.27-alpine nginx -t -c /etc/nginx/nginx.conf

  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    name: pytest
    runs-on: ubuntu-24.04
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx aiosqlite

      - name: Run tests
        env:
          ROUTER_IP: "192.168.100.1"
          DB_PATH: ":memory:"
          POLL_INTERVAL: "30"
          WEBHOOK_URLS: ""
        run: |
          cd backend
          python -m pytest ../tests/ \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:../coverage.xml \
            --tb=short \
            -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── Docker build smoke-test ──────────────────────────────────────────────────
  docker-build:
    name: Docker build smoke-test
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: docsis-app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: docsis-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker

      - name: Smoke-test backend container
        run: |
          docker run -d --name docsis-smoke \
            -e ROUTER_IP=192.168.100.1 \
            -e DB_PATH=/tmp/test.db \
            -e POLL_INTERVAL=3600 \
            -e WEBHOOK_URLS= \
            -p 18000:8000 \
            docsis-app:ci
          sleep 10
          curl -sf http://localhost:18000/health | grep -q 'ok'
          docker rm -f docsis-smoke

  # ── Trivy container vulnerability scan ──────────────────────────────────────
  trivy-scan:
    name: Trivy container scan
    runs-on: ubuntu-24.04
    needs: docker-build
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image for scanning
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: docsis-app:scan
          outputs: type=docker

      - name: Trivy scan — CRITICAL/HIGH only
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: docsis-app:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
