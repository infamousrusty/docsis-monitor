name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write  # for Trivy SARIF upload

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff + yamllint)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install ruff
        run: pip install ruff==0.4.10

      - name: Ruff lint
        run: ruff check backend/

      - name: Ruff format check
        run: ruff format --check backend/

      - name: yamllint
        run: |
          pip install yamllint
          yamllint -d relaxed docker-compose.yml prometheus.yml \
            grafana/provisioning/datasources/prometheus.yml \
            grafana/provisioning/dashboards/dashboard.yml

  # ───────────────────────────────────────────────────────────────────────────
  test:
    name: pytest (unit + integration)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio pytest-cov

      - name: Run tests
        run: |
          pytest ../tests/ \
            -v \
            --tb=short \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70
        env:
          ROUTER_IP: "192.168.100.1"
          DB_PATH: ":memory:"
          WEBHOOK_URLS: ""

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml

  # ───────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker build smoke test
    runs-on: ubuntu-24.04
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: docsis-monitor-app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: docsis-monitor-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker

      - name: Smoke test — backend container starts
        run: |
          docker run --rm -d \
            --name docsis-smoke \
            -e ROUTER_IP=192.168.100.1 \
            -e DB_PATH=/tmp/test.db \
            -e WEBHOOK_URLS="" \
            -p 8000:8000 \
            docsis-monitor-app:ci
          sleep 8
          curl -f http://localhost:8000/health
          docker stop docsis-smoke

  # ───────────────────────────────────────────────────────────────────────────
  trivy-scan:
    name: Trivy container security scan
    runs-on: ubuntu-24.04
    needs: [docker-build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image for scanning
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: docsis-monitor-app:scan
          outputs: type=docker

      - name: Run Trivy — CRITICAL/HIGH only, fail on CRITICAL
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: docsis-monitor-app:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Trivy — frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: nginx:1.27-alpine
          format: table
          severity: CRITICAL
          exit-code: "0"  # informational only for base images
