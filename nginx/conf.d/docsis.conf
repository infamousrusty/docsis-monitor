# ──────────────────────────────────────────────────────────────────────────────
# DOCSIS Monitor — nginx virtual host
# Tailscale-aware: bind on all interfaces, rely on TS ACLs for network-level
# access control. Optional basic-auth activated by BASIC_AUTH_USER env var.
# Rate-limiting protects the API and metrics endpoints.
# ──────────────────────────────────────────────────────────────────────────────

# ── Rate-limit zones ──────────────────────────────────────────────────────────
# 10 req/s per IP for the API (burst 20, no-delay on first 10)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
# 2 req/s per IP for /metrics (Prometheus scrape is controlled)
limit_req_zone $binary_remote_addr zone=metrics_limit:10m rate=2r/s;
# 30 req/s per IP for static assets
limit_req_zone $binary_remote_addr zone=static_limit:10m rate=30r/s;

# ── Connection limit (anti-DoS) ───────────────────────────────────────────────
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 80;
    server_name _;

    # ── Global hardening ──────────────────────────────────────────────────────
    server_tokens off;
    client_max_body_size 1m;
    client_body_timeout  12s;
    client_header_timeout 12s;
    keepalive_timeout    15s;
    send_timeout         10s;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"                always;
    add_header X-Content-Type-Options    "nosniff"             always;
    add_header X-XSS-Protection          "1; mode=block"       always;
    add_header Referrer-Policy           "strict-origin"       always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; "
        "script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://api.fontshare.com; "
        "style-src 'self' 'unsafe-inline' https://api.fontshare.com; "
        "font-src 'self' https://api.fontshare.com; "
        "img-src 'self' data:; "
        "connect-src 'self'; "
        "frame-ancestors 'none';" always;

    # ── Connection limits ─────────────────────────────────────────────────────
    limit_conn conn_limit 20;

    # ── Health endpoint (no auth, no rate-limit — used by Docker healthcheck) ─
    location = /health {
        proxy_pass         http://app:8000/health;
        proxy_read_timeout 5s;
        access_log off;
        allow all;
    }

    # ── Prometheus metrics (rate-limited; restrict to Tailscale subnet if needed) ──
    location = /metrics {
        limit_req zone=metrics_limit burst=5 nodelay;
        # Uncomment and set to your Tailscale subnet CIDR to restrict access:
        # allow 100.64.0.0/10;
        # deny  all;
        proxy_pass         http://app:8000/metrics;
        proxy_read_timeout 10s;
        access_log off;
    }

    # ── API ───────────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        # Optional basic auth — activated when htpasswd file exists
        # Generate with: htpasswd -cb /etc/nginx/auth/.htpasswd $USER $PASS
        # then mount in docker-compose volumes
        auth_basic           off;  # overridden below if file exists
        include              /etc/nginx/conf.d/auth.conf;

        proxy_pass            http://app:8000;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    30s;
        proxy_connect_timeout 5s;

        # Prevent response buffering — SSE/streaming-friendly
        proxy_buffering       off;
    }

    # ── Grafana (sub-path) ────────────────────────────────────────────────────
    location /grafana/ {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass          http://grafana:3000/;
        proxy_http_version  1.1;
        proxy_set_header    Host            $host;
        proxy_set_header    X-Real-IP       $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    Upgrade         $http_upgrade;
        proxy_set_header    Connection      "upgrade";
        proxy_read_timeout  60s;
    }

    # ── Static frontend ───────────────────────────────────────────────────────
    location / {
        limit_req zone=static_limit burst=50 nodelay;
        include   /etc/nginx/conf.d/auth.conf;

        proxy_pass          http://web:80;
        proxy_http_version  1.1;
        proxy_set_header    Host            $host;
        proxy_set_header    X-Real-IP       $remote_addr;
        proxy_read_timeout  15s;

        # Cache static assets aggressively
        proxy_cache_valid   200 1m;
    }

    # ── Deny hidden files ─────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
