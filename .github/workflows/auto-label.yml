---
name: Auto-label

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  issues:
    types: [opened]

concurrency:
  # One labeling run per PR/issue; cancel stale updates
  group: autolabel-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  label:
    name: Apply labels
    runs-on: ubuntu-24.04

    steps:
      # Always use base repository context (safe for pull_request_target)
      - name: Checkout base repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Apply labels via config
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true