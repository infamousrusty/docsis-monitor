---
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-24.04
    outputs:
      platform: ${{ steps.filter.outputs.platform }}
      security: ${{ steps.filter.outputs.security }}
      docs: ${{ steps.filter.outputs.docs }}
      app: ${{ steps.filter.outputs.app }}
      any: ${{ steps.filter.outputs.any }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Path filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            platform:
              - '.github/**'
              - 'Makefile'
              - 'scripts/**'
              - '.devcontainer/**'
            security:
              - '.gitleaks.toml'
              - '.github/SECURITY.md'
              - '.github/workflows/codeql.yml'
              - '.github/workflows/gitleaks.yml'
              - '.github/workflows/slsa.yml'
            docs:
              - 'docs/**'
              - 'README.md'
              - 'CONTRIBUTING.md'
            app:
              - 'src/**'
              - 'tests/**'
            any:
              - '**'

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.any == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pre-commit
        run: pip install pre-commit

      - uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit (scoped)
        run: |
          if [[ "${{ needs.changes.outputs.app }}" == "true" || \
                "${{ needs.changes.outputs.platform }}" == "true" ]]; then
            pre-commit run --all-files || pre-commit run --all-files
          else
            echo "No relevant changes for lint"
          fi
        env:
          SKIP: gitleaks,no-commit-to-branch

      - name: ShellCheck
        if: needs.changes.outputs.platform == 'true'
        run: |
          sudo apt-get install -y --no-install-recommends shellcheck
          find scripts -name "*.sh" -exec shellcheck --severity=warning {} +

      - uses: hadolint/hadolint-action@v3.1.0
        if: needs.changes.outputs.platform == 'true'
        with:
          dockerfile: .devcontainer/Dockerfile
          ignore: DL3008,DL3009,DL3059
          failure-threshold: warning

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.app == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src --cov-report=xml --cov-fail-under=80

      - uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: coverage.xml
          fail_ci_if_error: false

  build:
    name: Build Docker image
    runs-on: ubuntu-24.04
    needs: [changes, lint, test]
    if: |
      always() &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.changes.outputs.platform == 'true' || needs.changes.outputs.app == 'true')
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile
          push: false
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ci-pass:
    name: CI — All checks passed
    runs-on: ubuntu-24.04
    needs: [lint, test, build]
    if: always()
    steps:
      - name: Evaluate results
        run: |
          echo "lint:  ${{ needs.lint.result }}"
          echo "test:  ${{ needs.test.result }}"
          echo "build: ${{ needs.build.result }}"

          for result in \
            "${{ needs.lint.result }}" \
            "${{ needs.test.result }}" \
            "${{ needs.build.result }}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "A required job did not pass (got: $result)"
              exit 1
            fi
          done

          echo "✅ All required jobs passed"