---
name: Stale Issues and PRs

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

concurrency:
  # Single stale run at a time (prevents API thrash)
  group: stale-maintenance
  cancel-in-progress: false

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and close stale items
    runs-on: ubuntu-24.04

    steps:
      - name: Run stale bot
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # --- Issues ---
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: stale
          stale-issue-message: >
            This issue has been marked stale due to inactivity.
            It will be closed in 14 days unless updated.

          # --- PRs ---
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-label: stale
          stale-pr-message: >
            This PR has been marked stale. It will close in 7 days without activity.

          # --- Exemptions ---
          exempt-issue-labels: "pinned,security,in-progress"
          exempt-pr-labels: "pinned,security,in-progress"
          exempt-all-milestones: true

          # --- Safety Controls ---
          remove-stale-when-updated: true
          operations-per-run: 200   # Prevent API rate exhaustion
          ascending: true          # Oldest first (fair processing)

          # --- Optional stricter behaviour ---
          # close-issue-reason: not_planned